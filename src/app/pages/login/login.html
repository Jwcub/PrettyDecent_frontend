<div class="container login-container">
    <h1>Logga in</h1>
    <p>Det här är ett internt arbetsverktyg för personalen. Här uppdateras menyer och bordsplaceringar inför kvällens service.</p>

    <form class="login" (ngSubmit)="login()">
        <label>E-post
            <input type="email" name="email" [(ngModel)]="email">
        </label>

        <label>Lösenord
                <input type="password" name="password" [(ngModel)]="password">
        </label>

        <button class="btn">Logga in</button>

        <div>
            {{ message() }}
        </div>
    </form>
</div>
