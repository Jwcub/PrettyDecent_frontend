<div class="container login-container">
    <h1>Login</h1>
    <p>This is an internal workspace for the hands that shape the night. Here, menus are locked into place and tables are arranged before the first guest arrives.</p>

    <form class="login" (ngSubmit)="login()">
        <label>Email
            <input type="email" name="email" [(ngModel)]="email">
        </label>

        <label>Password
                <input type="password" name="password" [(ngModel)]="password">
        </label>

        <button class="btn">Log in</button>

        <div>
            {{ message() }}
        </div>
    </form>
</div>
