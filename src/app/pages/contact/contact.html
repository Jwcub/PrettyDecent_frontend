<div class="container contact-container">
    <h1>Contact us</h1>
    <p>A seat awaits in our candle-lit corner. Join us for an evening of unpolished sophistication in the heart of Södermalm.</p>

    <div class="contact-grid">
        <section>
            <figure>
                <img src="desert.jpg" alt="desert" class="imageframe">
                <figcaption>White Chocolate Shell with lemon mousse and lingonberries</figcaption>
            </figure>
        </section>

        <section>
            <form class="user-form contactform" (ngSubmit)="sendMessage()">
                <label>Name *
                    <input required minlength="3" type="text" name="name" [(ngModel)]="name">
                </label>

                <label>Email *
                    <input required minlength="10" type="email" name="email" [(ngModel)]="email">
                </label>

                <label>Title *
                    <input type="text" name="title" [(ngModel)]="title">
                </label>

                <label>Message *
                    <textarea name="message" [(ngModel)]="message"></textarea>
                </label>

                <button class="btn submit-message">Send</button>

                <p>* Required field</p>

                <p>{{ apiMessage()}}</p>
            </form>
        </section>
    </div>
</div>
