<header>
  <div class="container header-container">
    <div class="logo-area">
        <a routerLink="/" class="logo-link">
        <img src="prettyDecentLogo.svg" alt="Pretty Decent" class="logo-img">
        </a>
    </div>

    <button class="hamburger-btn" (click)="toggleMenu()" [class.open]="isMenuOpen" aria-label="Open menu">
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

    <nav class="main-nav" [class.open]="isMenuOpen">
      <ul>
        <li><a routerLink="/" routerLinkActive="active">Home</a></li>
        <li><a routerLink="/menu" routerLinkActive="active">Menu</a></li>
        <li><a routerLink="/about" routerLinkActive="active">About</a></li>
        <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
        <li class="mobile-only"><button class="btn book-table">Book table</button></li>
      </ul>
    </nav>

    <div class="header-actions">
        <button class="btn book-table" routerLink="/booking">Book a table</button>
    </div>
  </div>
</header>
